services:
  - type: web
    name: samruna-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.0.0
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: CORS_ORIGINS
        value: https://mdasifinit.github.io,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173
